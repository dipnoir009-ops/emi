<!DOCTYPE html>
<html>
<head>
  <title>EMI Calculator Pro</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: white;
    }

    .box {
      background: #1e293b;
      padding: 30px;
      width: 340px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      background: #334155;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #22c55e;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #16a34a;
    }

    .result {
      margin-top: 20px;
      text-align: left;
      font-size: 15px;
    }

    .result div {
      margin: 8px 0;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>EMI Calculator</h2>

  <input type="number" id="loan" placeholder="Loan Amount (₹)">
  <input type="number" id="rate" placeholder="Interest Rate (%)">
  <input type="number" id="time" placeholder="Time (months)">

  <button onclick="calculateEMI()">Calculate</button>

  <div class="result" id="result"></div>
</div>

<script>
function calculateEMI() {
  let P = document.getElementById("loan").value;
  let R = document.getElementById("rate").value / 12 / 100;
  let N = document.getElementById("time").value;

  let EMI = (P * R * Math.pow(1+R, N)) / (Math.pow(1+R, N) - 1);
  let totalPayment = EMI * N;
  let totalInterest = totalPayment - P;

  document.getElementById("result").innerHTML =
    "<div>Monthly EMI: ₹" + EMI.toFixed(2) + "</div>" +
    "<div>Total Payment: ₹" + totalPayment.toFixed(2) + "</div>" +
    "<div>Total Interest: ₹" + totalInterest.toFixed(2) + "</div>";
}
</script>

</body>
</html>
