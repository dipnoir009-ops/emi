<!DOCTYPE html>
<html>
<head>
  <title>EMI Calculator</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }
    .box {
      background: white;
      padding: 20px;
      margin: 50px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input {
      margin: 10px;
      padding: 10px;
      width: 90%;
    }
    button {
      padding: 10px;
      width: 100%;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>EMI Calculator</h2>

  <input type="number" id="loan" placeholder="Loan Amount">
  <input type="number" id="rate" placeholder="Interest Rate (%)">
  <input type="number" id="time" placeholder="Time (months)">

  <button onclick="calculateEMI()">Calculate</button>

  <h3 id="result"></h3>
</div>

<script>
function calculateEMI() {
  let P = document.getElementById("loan").value;
  let R = document.getElementById("rate").value / 12 / 100;
  let N = document.getElementById("time").value;

  let EMI = (P * R * Math.pow(1+R, N)) / (Math.pow(1+R, N) - 1);

  document.getElementById("result").innerText =
    "Your EMI is: ₹" + EMI.toFixed(2);
}
</script>

</body>
</html>
